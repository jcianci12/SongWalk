services:
  songshare:
    build: .
    ports:
      - "${SONGSHARE_PUBLISHED_PORT:-8080}:8080"
    environment:
      SONGSHARE_DATA_DIR: /data
      SONGSHARE_BASE_URL: ${SONGSHARE_BASE_URL:-http://localhost:8080}
      ngroktoken: [REDACTED_NGROK_TOKEN]
    volumes:
      - ./songshare-data:/data
