services:
  songshare:
    build: .
    ports:
      - "${SONGSHARE_PUBLISHED_PORT:-8080}:8080"
    environment:
      SONGSHARE_DATA_DIR: /data
      SONGSHARE_BASE_URL: ${SONGSHARE_BASE_URL:-}
      SONGSHARE_QUICK_TUNNEL_ENABLED: ${SONGSHARE_QUICK_TUNNEL_ENABLED:-1}
      SONGSHARE_PROXY_HOPS: ${SONGSHARE_PROXY_HOPS:-1}
      SONGSHARE_YOUTUBE_DL_BIN: ${SONGSHARE_YOUTUBE_DL_BIN:-}
      SONGSHARE_SPOTIFY_DL_BIN: ${SONGSHARE_SPOTIFY_DL_BIN:-}
      SONGSHARE_SPOTIFY_CLIENT_ID: ${SONGSHARE_SPOTIFY_CLIENT_ID:-}
      SONGSHARE_SPOTIFY_CLIENT_SECRET: ${SONGSHARE_SPOTIFY_CLIENT_SECRET:-}
    volumes:
      - ./songshare-data:/data
